<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FIT-TI 체크인</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.6/dist/web/static/pretendard.css" rel="stylesheet">
<style>
:root{
  --p:#70658B;--s:#665B8B;--lav:#EAE4F4;--bg:#FAF9FC;
  --tx:#2F2A39;--sub:#6F6A79;--bd:#ECE7F5;--w:#FFFFFF;
  --green:#2D7D4F;--red:#C0392B;
  --grad:linear-gradient(135deg,#70658B,#9B91BB);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;padding-bottom:80px}

/* ── NAV ── */
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--w);border-top:1px solid var(--bd);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0;font-size:10px;font-weight:700;color:var(--sub);letter-spacing:.04em;border:none;background:none;cursor:pointer;transition:color .2s}
.nav-btn.active{color:var(--p)}
.nav-icon{font-size:20px}

/* ── SCREENS ── */
.screen{display:none;max-width:480px;margin:0 auto;padding:24px 20px}
.screen.active{display:block}

/* ── SETUP ── */
.setup-logo{text-align:center;margin-bottom:32px}
.setup-logo h1{font-size:28px;font-weight:900;letter-spacing:-.04em;color:var(--p)}
.setup-logo p{font-size:13px;color:var(--sub);margin-top:6px}
.field{margin-bottom:20px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--p);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.field input,.field select{width:100%;padding:14px 16px;border:1.5px solid var(--bd);border-radius:14px;font-family:inherit;font-size:15px;color:var(--tx);background:var(--w);outline:none;transition:border-color .2s}
.field input:focus,.field select:focus{border-color:var(--p)}
.btn-primary{width:100%;padding:16px;background:var(--grad);color:#fff;border:none;border-radius:16px;font-family:inherit;font-size:16px;font-weight:800;letter-spacing:-.02em;cursor:pointer;margin-top:8px;transition:opacity .2s}
.btn-primary:active{opacity:.85}

/* ── TODAY ── */
.today-header{margin-bottom:20px}
.today-date{font-size:12px;font-weight:700;color:var(--sub);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
.today-name{font-size:22px;font-weight:900;letter-spacing:-.03em;color:var(--tx)}
.today-type{font-size:13px;color:var(--p);font-weight:700;margin-top:2px}

.week-card{background:var(--w);border-radius:20px;padding:20px;border:1px solid var(--bd);margin-bottom:16px}
.week-card-label{font-size:10px;font-weight:700;color:var(--p);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.week-card-label::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--p);display:inline-block}
.week-card-text{font-size:14px;line-height:1.75;color:var(--tx)}

.check-section{background:var(--w);border-radius:20px;padding:22px;border:1px solid var(--bd);margin-bottom:16px}
.check-q{font-size:16px;font-weight:800;letter-spacing:-.02em;margin-bottom:16px;color:var(--tx)}
.check-btns{display:flex;gap:10px;margin-bottom:0}
.check-btn{flex:1;padding:14px;border-radius:14px;border:2px solid var(--bd);background:var(--w);font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;color:var(--sub)}
.check-btn.yes{border-color:var(--green);color:var(--green);background:rgba(45,125,79,.06)}
.check-btn.no{border-color:var(--red);color:var(--red);background:rgba(192,57,43,.06)}
.check-btn.selected.yes{background:var(--green);color:#fff}
.check-btn.selected.no{background:var(--red);color:#fff}

.reflect-box{margin-top:16px;display:none}
.reflect-box.show{display:block}
.reflect-label{font-size:12px;font-weight:700;color:var(--sub);margin-bottom:8px}
.reflect-input{width:100%;padding:12px 14px;border:1.5px solid var(--bd);border-radius:12px;font-family:inherit;font-size:14px;line-height:1.7;color:var(--tx);background:var(--bg);resize:none;min-height:90px;outline:none;transition:border-color .2s}
.reflect-input:focus{border-color:var(--p)}
.reflect-hint{font-size:11px;color:var(--sub);margin-top:6px;line-height:1.6}

.save-btn{width:100%;padding:16px;background:var(--grad);color:#fff;border:none;border-radius:16px;font-family:inherit;font-size:15px;font-weight:800;cursor:pointer;transition:opacity .2s;display:none}
.save-btn.show{display:block}
.save-btn:active{opacity:.85}

.saved-msg{text-align:center;padding:16px;font-size:14px;color:var(--green);font-weight:700;display:none}
.saved-msg.show{display:block}

/* ── WEEK ── */
.week-header{margin-bottom:20px}
.week-title{font-size:20px;font-weight:900;letter-spacing:-.03em;margin-bottom:4px}
.week-sub{font-size:13px;color:var(--sub)}

.progress-bar-wrap{background:var(--w);border-radius:16px;padding:18px;border:1px solid var(--bd);margin-bottom:20px}
.progress-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.progress-label span:first-child{font-size:13px;font-weight:700;color:var(--tx)}
.progress-pct{font-size:20px;font-weight:900;color:var(--p)}
.progress-bar{height:8px;background:var(--bd);border-radius:100px;overflow:hidden}
.progress-fill{height:100%;background:var(--grad);border-radius:100px;transition:width .8s cubic-bezier(.4,0,.2,1)}

.log-list{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.log-item{background:var(--w);border-radius:14px;padding:14px 16px;border:1px solid var(--bd);display:flex;gap:12px;align-items:flex-start}
.log-dot{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;margin-top:1px}
.log-dot.done{background:rgba(45,125,79,.1);color:var(--green)}
.log-dot.miss{background:rgba(192,57,43,.1);color:var(--red)}
.log-dot.empty{background:var(--bd);color:var(--sub)}
.log-info{}
.log-date{font-size:11px;color:var(--sub);font-weight:600;margin-bottom:3px}
.log-reflect{font-size:13px;line-height:1.65;color:var(--tx)}
.log-empty{font-size:13px;color:var(--sub);font-style:italic}

/* ── SUMMARY ── */
.summary-card{background:var(--tx);border-radius:22px;padding:24px;margin-bottom:16px;color:#fff}
.summary-card-title{font-size:13px;font-weight:700;color:rgba(255,255,255,.5);letter-spacing:.08em;text-transform:uppercase;margin-bottom:16px}
.summary-text{font-size:13px;line-height:1.9;color:rgba(255,255,255,.88);white-space:pre-wrap;font-family:'Pretendard',monospace}
.copy-btn{width:100%;padding:16px;background:var(--lav);color:var(--p);border:none;border-radius:16px;font-family:inherit;font-size:15px;font-weight:800;cursor:pointer;transition:background .2s}
.copy-btn:active{background:var(--bd)}
.copy-done{text-align:center;color:var(--green);font-size:14px;font-weight:700;padding:12px;display:none}
.copy-done.show{display:block}

.reset-btn{width:100%;padding:12px;background:none;border:1.5px solid var(--bd);border-radius:14px;font-family:inherit;font-size:13px;color:var(--sub);cursor:pointer;margin-top:20px}

/* ── UTILS ── */
.mt8{margin-top:8px}
.mt16{margin-top:16px}
.tag{display:inline-block;font-size:10px;font-weight:700;background:var(--lav);color:var(--p);border-radius:100px;padding:3px 10px;letter-spacing:.06em}
</style>
</head>
<body>

<!-- SCREEN 1: SETUP -->
<div class="screen active" id="screenSetup">
  <div class="setup-logo">
    <h1>FIT-TI</h1>
    <p>나의 행동 패턴 12주 체크인</p>
  </div>
  <div class="field">
    <label>이름</label>
    <input type="text" id="inputName" placeholder="이름을 입력하세요">
  </div>
  <div class="field">
    <label>FIT-TI 유형</label>
    <select id="inputType">
      <option value="">유형을 선택하세요</option>
      <option value="emotion_selftalk">🌊 감정-자기비판 복합형</option>
      <option value="emotion_recovery">🌊 감정-회복지연 복합형</option>
      <option value="emotion_motivation">🌊 감정-동기 연동형</option>
      <option value="selftalk_behavior">🔮 자기비판-반복패턴 복합형</option>
      <option value="selftalk_recovery">🔮 자기비판-회복지연 복합형</option>
      <option value="thinking_behavior">💭 사고루프-반복패턴 복합형</option>
      <option value="thinking_recovery">💭 사고루프-회복지연 복합형</option>
      <option value="environment_relationship">🌿 환경-관계의존 복합형</option>
      <option value="environment_behavior">🌿 환경의존-반복패턴 복합형</option>
      <option value="motivation_relationship">⚡ 동기-관계의존 복합형</option>
      <option value="motivation_behavior">⚡ 동기소진-반복패턴 복합형</option>
      <option value="relationship_selftalk">🤝 관계의존-자기비판 복합형</option>
    </select>
  </div>
  <div class="field">
    <label>시작 주차</label>
    <select id="inputWeek">
      <option value="1">1주차 — 패턴 인식</option>
      <option value="2">2주차 — 패턴 인식</option>
      <option value="3">3주차 — 최소 루틴</option>
      <option value="4">4주차 — 최소 루틴</option>
      <option value="5">5주차 — 구조 설계</option>
      <option value="6">6주차 — 구조 설계</option>
      <option value="7">7주차 — 강화</option>
      <option value="8">8주차 — 강화</option>
      <option value="9">9주차 — 자립</option>
      <option value="10">10주차 — 자립</option>
      <option value="11">11주차 — 유지</option>
      <option value="12">12주차 — 유지</option>
    </select>
  </div>
  <button class="btn-primary" onclick="setupSave()">시작하기 →</button>
</div>

<!-- SCREEN 2: TODAY -->
<div class="screen" id="screenToday">
  <div class="today-header">
    <div class="today-date" id="todayDate"></div>
    <div class="today-name" id="todayName"></div>
    <div class="today-type" id="todayType"></div>
  </div>

  <div class="week-card">
    <div class="week-card-label">이번 주 미션</div>
    <div class="week-card-text" id="missionText"></div>
  </div>
  <div class="week-card">
    <div class="week-card-label">오늘의 숙제</div>
    <div class="week-card-text" id="hwText"></div>
  </div>

  <div class="check-section">
    <div class="check-q">오늘 숙제했어요?</div>
    <div class="check-btns">
      <button class="check-btn yes" id="btnYes" onclick="selectCheck('yes')">✅ 했어요</button>
      <button class="check-btn no" id="btnNo" onclick="selectCheck('no')">❌ 못 했어요</button>
    </div>

    <div class="reflect-box" id="reflectBox">
      <div class="reflect-label" id="reflectLabel"></div>
      <textarea class="reflect-input" id="reflectInput" placeholder="자유롭게 써보세요 — 안 써도 괜찮아요" rows="3"></textarea>
      <div class="reflect-hint" id="reflectHint"></div>
    </div>
  </div>

  <button class="save-btn" id="saveBtn" onclick="saveToday()">저장하기</button>
  <div class="saved-msg" id="savedMsg">✓ 오늘 기록이 저장됐어요</div>
</div>

<!-- SCREEN 3: WEEK -->
<div class="screen" id="screenWeek">
  <div class="week-header">
    <div class="week-title" id="weekTitle"></div>
    <div class="week-sub" id="weekSub"></div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-label">
      <span>이번 주 실행률</span>
      <span class="progress-pct" id="progressPct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>
  <div class="log-list" id="logList"></div>
</div>

<!-- SCREEN 4: SUMMARY -->
<div class="screen" id="screenSummary">
  <div class="week-card" style="margin-bottom:16px">
    <div class="week-card-label">주간 요약 — 여왕님께 보내기</div>
    <div class="week-card-text" style="font-size:13px;color:var(--sub);margin-top:2px">아래 텍스트를 복사해서 카카오로 보내주세요.</div>
  </div>
  <div class="summary-card">
    <div class="summary-card-title">FIT-TI 주간 리포트</div>
    <div class="summary-text" id="summaryText"></div>
  </div>
  <button class="copy-btn" onclick="copySum()">📋 복사해서 보내기</button>
  <div class="copy-done" id="copyDone">✓ 복사됐어요! 카카오에 붙여넣기 하세요.</div>
  <button class="reset-btn" onclick="confirmReset()">⚙️ 프로필 초기화</button>
</div>

<!-- BOTTOM NAV -->
<nav class="nav" id="mainNav" style="display:none">
  <button class="nav-btn active" id="nav0" onclick="showScreen('screenToday',0)">
    <span class="nav-icon">✏️</span>오늘
  </button>
  <button class="nav-btn" id="nav1" onclick="showScreen('screenWeek',1)">
    <span class="nav-icon">📅</span>이번 주
  </button>
  <button class="nav-btn" id="nav2" onclick="showScreen('screenSummary',2)">
    <span class="nav-icon">📤</span>요약
  </button>
</nav>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// CURRICULUM DATA (12 types × 12 weeks)
// [mission, homework, habit]
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const C = {
emotion_selftalk:[
  ["기분 좋은 날·나쁜 날의 운동 기준 각각 써보기","운동 전후 기분 점수 1-10 기록","하루 마무리에 오늘 기분이 몇이었어? 한 줄 쓰기"],
  ["자책이 온 순간 3번 기록 — 언제·어떤 말·얼마나","못 한 날 → 자책 대신 제일 힘들었던 것 한 줄","자책이 시작되면 10분 기다리기"],
  ["기분 나쁜 날 예측되는 요일에 5분 루틴 실행","기분 점수 6 이하인 날 → 5분 루틴만 하기","했다/못했다 대신 몇 분 했어?로 기준 바꾸기"],
  ["4주 기록 보고 자책 강했던 날·기분 점수 관계 찾기","못 한 날 → 내일 계획만 한 줄, 어제 얘기 없이","잠들기 전 오늘 한 것 하나 찾기"],
  ["자책을 유발하는 상황 3가지 목록 만들기","트리거 상황이 오면 미리 자책이 올 수 있어 예측하기","자책 대신 이 감정은 익숙한 패턴이야 이름 붙이기"],
  ["기분 나쁜 날 운동한 경험 하나 만들기 — 2분이어도 됨","기분 점수 5 이하인 날 → 2-5분이라도 기록","운동을 기분 개선 도구로 보지 않기 — 그냥 했다로 충분"],
  ["못 한 날 일지를 자책 없이 분석으로만 써보기","못 한 날 → 분석 한 줄만. 자책 문장 없이","왜 이럴까 → 어떤 상황이었을까로 질문 바꾸기"],
  ["나쁜 날 루틴 최종 완성 — 동작·시간·장소 구체적으로","이번 주 나쁜 날 루틴 실행 횟수 기록","루틴 전 기분 점수 체크 → 낮을수록 기준 낮추기"],
  ["기분 점수에 따라 스스로 기준 조정해서 운동하기","기준 조정한 날 → 어떻게 결정했는지 한 줄","자책이 왔다가 가는 시간 기록 — 점점 짧아지는지"],
  ["이번 주 자책 문장 쓰지 않기 — 대신 분석 문장만","못 한 날 → 내일 계획만. 어제 얘기 없이","오늘 한 것 잠자리에서 하나 찾기"],
  ["다음 12주 운동 구조 직접 설계하기","세 가지 루틴(나쁜 날·보통·좋은 날) 최종 정리","주 1회 내 패턴 셀프 체크"],
  ["12주 전과 지금 비교 — 자책 빈도·강도·지속 시간","나에게 쓰는 편지 — 12주 동안 달라진 것","앞으로 자책이 오면 나만의 프로토콜 작성"],
],
emotion_recovery:[
  ["이번 주 쉰 날들 기록 — 쉰 이유·기분·쉬고 나서 느낌","매일 운동했나/못했나 + 이유 한 줄","쉬는 것에 이유 붙이기 — 피곤 vs 감정 소진 구분"],
  ["쉬고 나서 다시 시작하는 데 며칠 걸리는지 3번 측정","쉰 날 다음날 → 복귀 시도했는지 기록","쉬었다는 것에 판단 없이 다음 복귀는 언제?로 넘어가기"],
  ["10분짜리 복귀 루틴 만들기 — 강도 낮은 동작 3가지","3일 이상 쉬면 → 무조건 복귀 루틴 실행","쉰 날 수보다 복귀한 날 수 세기"],
  ["빠른 복귀를 가능하게 한 조건 3가지 찾기","복귀 루틴 실행 후 기분 기록","복귀할 때마다 돌아왔다 한 줄 기록"],
  ["감정 소진 수준 1-3으로 나눠 각각 루틴 만들기","오늘 소진 수준 기록 → 해당 루틴 실행","오늘은 몇 번 소진됐어?로 하루 체크"],

let profile = JSON.parse(localStorage.getItem('fitti_profile') || 'null');
let logs = JSON.parse(localStorage.getItem('fitti_logs') || '[]');
let todayCheck = null;

function save() {
  localStorage.setItem('fitti_profile', JSON.stringify(profile));
  localStorage.setItem('fitti_logs', JSON.stringify(logs));
}

function todayStr() {
  return new Date().toISOString().slice(0,10);
}

function getWeekDays() {
  if (!profile) return [];
  const start = new Date(profile.startDate);
  const week = parseInt(profile.week);
  const weekStart = new Date(start);
  weekStart.setDate(start.getDate() + (week-1)*7);
  const days = [];
  for (let i=0; i<7; i++) {
    const d = new Date(weekStart);
    d.setDate(weekStart.getDate() + i);
    days.push(d.toISOString().slice(0,10));
  }
  return days;
}

function getLog(dateStr) {
  return logs.find(l => l.date === dateStr) || null;
}

function setupSave() {
  const name = document.getElementById('inputName').value.trim();
  const type = document.getElementById('inputType').value;
  const week = document.getElementById('inputWeek').value;
  if (!name || !type) { alert('이름과 유형을 선택해주세요.'); return; }
  profile = { name, type, week: parseInt(week), startDate: todayStr() };
  save();
  initMain();
}

function initMain() {
  document.getElementById('screenSetup').classList.remove('active');
  document.getElementById('mainNav').style.display = 'flex';
  showScreen('screenToday', 0);
  renderToday();
}

function showScreen(id, navIdx) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach((b,i) => b.classList.toggle('active', i===navIdx));
  document.getElementById(id).classList.add('active');
  if (id === 'screenToday') renderToday();
  if (id === 'screenWeek') renderWeek();
  if (id === 'screenSummary') renderSummary();
}

function renderToday() {
  if (!profile) return;
  const today = todayStr();
  const d = new Date(today);
  const weeks = ['일','월','화','수','목','금','토'];
  document.getElementById('todayDate').textContent =
    `${d.getMonth()+1}월 ${d.getDate()}일 ${weeks[d.getDay()]}요일 — ${profile.week}주차`;
  document.getElementById('todayName').textContent = `${profile.name}님`;
  document.getElementById('todayType').textContent = TYPE_LABELS[profile.type] || '';

  const w = parseInt(profile.week) - 1;
  const data = C[profile.type] ? C[profile.type][w] : null;
  document.getElementById('missionText').textContent = data ? data[0] : '미션 정보 없음';
  document.getElementById('hwText').textContent = data ? data[1] : '숙제 정보 없음';

  // Check if already logged today
  const existing = getLog(today);
  todayCheck = existing ? existing.done : null;
  document.getElementById('savedMsg').classList.toggle('show', !!existing);
  document.getElementById('saveBtn').classList.toggle('show', !existing && todayCheck !== null);

  if (existing) {
    document.getElementById('btnYes').classList.toggle('selected', existing.done);
    document.getElementById('btnNo').classList.toggle('selected', !existing.done);
    showReflect(existing.done, existing.reflect, true);
  } else {
    document.getElementById('btnYes').classList.remove('selected');
    document.getElementById('btnNo').classList.remove('selected');
    document.getElementById('reflectBox').classList.remove('show');
  }
}

function selectCheck(val) {
  const existing = getLog(todayStr());
  if (existing) return; // already saved
  todayCheck = val === 'yes';
  document.getElementById('btnYes').classList.toggle('selected', todayCheck);
  document.getElementById('btnNo').classList.toggle('selected', !todayCheck);
  showReflect(todayCheck, '', false);
  document.getElementById('saveBtn').classList.add('show');
}

function showReflect(done, value, readonly) {
  const box = document.getElementById('reflectBox');
  const lbl = document.getElementById('reflectLabel');
  const inp = document.getElementById('reflectInput');
  const hint = document.getElementById('reflectHint');
  box.classList.add('show');
  if (done) {
    lbl.textContent = '더 잘 할 수 있었겠다 싶은 부분이 있나요?';
    hint.textContent = '작은 것도 괜찮아요. 없으면 안 써도 돼요.';
  } else {
    lbl.textContent = '오늘 뭐가 제일 힘들었어요?';
    hint.textContent = '상황이든 감정이든 자유롭게 써도 돼요.';
  }
  inp.value = value || '';
  inp.readOnly = readonly;
  inp.style.opacity = readonly ? '.7' : '1';
}

function saveToday() {
  if (todayCheck === null) return;
  const reflect = document.getElementById('reflectInput').value.trim();
  logs.push({ date: todayStr(), done: todayCheck, reflect });
  save();
  document.getElementById('saveBtn').classList.remove('show');
  document.getElementById('savedMsg').classList.add('show');
  document.getElementById('reflectInput').readOnly = true;
  document.getElementById('reflectInput').style.opacity = '.7';
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// WEEK
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderWeek() {
  if (!profile) return;
  const days = getWeekDays();
  const weekLogs = days.map(d => getLog(d));
  const done = weekLogs.filter(l => l && l.done).length;
  const logged = weekLogs.filter(l => l).length;
  const pct = logged ? Math.round((done/logged)*100) : 0;

  document.getElementById('weekTitle').textContent = `${profile.week}주차 기록`;
  document.getElementById('weekSub').textContent = `${profile.name}님 — ${TYPE_LABELS[profile.type]||''}`;
  document.getElementById('progressPct').textContent = `${pct}%`;
  setTimeout(() => {
    document.getElementById('progressFill').style.width = `${pct}%`;
  }, 50);

  const weeks = ['일','월','화','수','목','금','토'];
  const today = todayStr();
  const list = document.getElementById('logList');
  list.innerHTML = days.map(d => {
    const dt = new Date(d);
    const dayLabel = `${dt.getMonth()+1}/${dt.getDate()} (${weeks[dt.getDay()]})`;
    const log = getLog(d);
    const isFuture = d > today;
    if (isFuture) {
      return `<div class="log-item"><div class="log-dot empty">○</div><div class="log-info"><div class="log-date">${dayLabel}</div><div class="log-empty">아직이에요</div></div></div>`;
    }
    if (!log) {
      return `<div class="log-item"><div class="log-dot empty">—</div><div class="log-info"><div class="log-date">${dayLabel}</div><div class="log-empty">기록 없음</div></div></div>`;
    }
    const icon = log.done ? '✓' : '×';
    const cls = log.done ? 'done' : 'miss';
    const reflectHTML = log.reflect ? `<div class="log-reflect">${log.reflect}</div>` : '';
    return `<div class="log-item"><div class="log-dot ${cls}">${icon}</div><div class="log-info"><div class="log-date">${dayLabel} — ${log.done ? '했어요' : '못 했어요'}</div>${reflectHTML}</div></div>`;
  }).join('');
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// SUMMARY
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderSummary() {
  if (!profile) return;
  const days = getWeekDays();
  const weekLogs = days.map(d => ({ date: d, log: getLog(d) }));
  const done = weekLogs.filter(x => x.log && x.log.done).length;
  const logged = weekLogs.filter(x => x.log).length;
  const pct = logged ? Math.round((done/logged)*100) : 0;
  const weeks = ['일','월','화','수','목','금','토'];

  const w = parseInt(profile.week) - 1;
  const data = C[profile.type] ? C[profile.type][w] : null;
  const mission = data ? data[0] : '-';

  const reflectLines = weekLogs
    .filter(x => x.log && x.log.reflect)
    .map(x => {
      const dt = new Date(x.date);
      const tag = x.log.done ? '✅' : '❌';
      return `  ${tag} ${dt.getMonth()+1}/${dt.getDate()} — ${x.log.reflect}`;
    }).join('\n');

  const txt = [
    `📊 ${profile.name} 님 — ${profile.week}주차 주간 리포트`,
    `유형: ${TYPE_LABELS[profile.type]||''}`,
    ``,
    `✅ 실행: ${done}/${logged}일 (${pct}%)`,
    ``,
    `📌 이번 주 미션`,
    `  ${mission}`,
    ``,
    reflectLines ? `📝 메모\n${reflectLines}` : `📝 메모 없음`,
    ``,
    `─────────────────`,
    `FIT-TI 12주 행동패턴 개선 프로그램`,
  ].join('\n');

  document.getElementById('summaryText').textContent = txt;
}

function copySum() {
  const txt = document.getElementById('summaryText').textContent;
  navigator.clipboard.writeText(txt).then(() => {
    document.getElementById('copyDone').classList.add('show');
    setTimeout(() => document.getElementById('copyDone').classList.remove('show'), 3000);
  });
}

function confirmReset() {
  if (confirm('프로필과 기록이 모두 삭제돼요. 계속할까요?')) {
    localStorage.removeItem('fitti_profile');
    localStorage.removeItem('fitti_logs');
    location.reload();
  }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// INIT
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
if (profile) {
  document.getElementById('screenSetup').classList.remove('active');
  document.getElementById('mainNav').style.display = 'flex';
  showScreen('screenToday', 0);
}
</script>
