<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>RESET21 | FIT-TI</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
:root{
  --lav:#C8B6FF;--lav2:#9B7BFF;--lav3:#7358FF;
  --lav-s:#F0EBFF;--lav-m:#E0D4FF;
  --navy:#1E2B4F;--bg:#F8F6FF;--card:#FFF;
  --tx:#1F2430;--tx2:#6B7280;--bd:rgba(0,0,0,.07);
  --ok:#7FD59A;--warn:#FFC857;--red:#F06C6C;
  --font:'Pretendard',-apple-system,sans-serif;
  --ease:cubic-bezier(.4,0,.2,1);
  --spring:cubic-bezier(.34,1.56,.64,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased;min-height:100vh}
button{cursor:pointer;font-family:var(--font);border:none;background:none}
input,textarea{font-family:var(--font)}
.hidden{display:none!important}

/* SCREENS */
.screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}

/* LOGIN */
.login-box{width:100%;max-width:400px;background:var(--card);border-radius:28px;padding:40px 32px;box-shadow:0 8px 40px rgba(30,43,79,.1)}
.login-logo{font-size:22px;font-weight:900;color:var(--navy);letter-spacing:-.04em;margin-bottom:4px}
.login-logo em{font-style:normal;color:var(--lav2)}
.login-sub{font-size:13px;color:var(--tx2);margin-bottom:32px}
.login-label{font-size:12px;font-weight:700;color:var(--tx2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;display:block}
.login-input{width:100%;height:52px;border:1.5px solid var(--bd);border-radius:14px;padding:0 16px;font-size:16px;color:var(--tx);background:var(--bg);outline:none;transition:border-color .2s;letter-spacing:.08em}
.login-input:focus{border-color:var(--lav2)}
.login-btn{width:100%;height:52px;background:linear-gradient(135deg,var(--lav2),var(--lav3));color:#fff;border-radius:999px;font-size:16px;font-weight:800;margin-top:16px;box-shadow:0 6px 24px rgba(155,123,255,.35);transition:transform .2s var(--spring)}
.login-btn:hover{transform:scale(1.02)}
.login-err{font-size:13px;color:var(--red);text-align:center;margin-top:10px}

/* DASHBOARD */
#dash{max-width:480px;width:100%;padding:20px 20px 60px}
.dash-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;padding-top:16px}
.dash-logo{font-size:18px;font-weight:900;color:var(--navy);letter-spacing:-.04em}
.dash-logo em{font-style:normal;color:var(--lav2)}
.dash-logout{font-size:13px;color:var(--tx2);background:var(--lav-s);padding:6px 14px;border-radius:999px}

.day-card{background:var(--navy);border-radius:28px;padding:28px 24px;margin-bottom:16px;position:relative;overflow:hidden}
.day-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 30% 0%,rgba(200,182,255,.2) 0%,transparent 65%);pointer-events:none}
.day-card-inner{position:relative}
.day-badge{font-size:11px;font-weight:700;color:rgba(255,255,255,.4);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px}
.day-num{font-size:52px;font-weight:900;color:#fff;letter-spacing:-.04em;line-height:1}
.day-total{font-size:18px;color:rgba(255,255,255,.4);font-weight:600}
.day-greeting{font-size:15px;color:rgba(255,255,255,.7);margin-top:8px}
.day-progress-wrap{margin-top:18px}
.day-progress-bg{height:6px;background:rgba(255,255,255,.15);border-radius:999px;overflow:hidden}
.day-progress-fill{height:100%;background:var(--lav);border-radius:999px;transition:width .8s var(--ease)}
.day-progress-label{font-size:11px;color:rgba(255,255,255,.35);margin-top:6px}

.status-card{background:var(--card);border:1.5px solid var(--lav-m);border-radius:20px;padding:20px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.status-card.done{border-color:var(--ok);background:rgba(127,213,154,.06)}
.status-icon{font-size:22px}
.status-text{flex:1;margin-left:14px}
.status-title{font-size:15px;font-weight:700;color:var(--tx)}
.status-sub{font-size:12px;color:var(--tx2);margin-top:2px}
.status-btn{font-size:13px;font-weight:700;color:#fff;background:var(--lav2);padding:8px 18px;border-radius:999px;transition:transform .2s var(--spring)}
.status-btn:hover{transform:scale(1.04)}
.status-done-badge{font-size:12px;font-weight:700;color:var(--ok);background:rgba(127,213,154,.15);padding:6px 12px;border-radius:999px}

.week-box{background:var(--card);border:1px solid var(--bd);border-radius:20px;padding:20px;margin-top:4px}
.week-title{font-size:13px;font-weight:700;color:var(--tx2);margin-bottom:14px;letter-spacing:.04em;text-transform:uppercase}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.week-day{aspect-ratio:1;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:1.5px solid var(--bd);color:var(--tx2)}
.week-day.done{background:var(--lav2);border-color:var(--lav2);color:#fff}
.week-day.today{border-color:var(--lav2);color:var(--lav2)}
.week-day.future{opacity:.35}

/* FORM */
#form-screen{background:var(--bg)}
.form-wrap{max-width:480px;width:100%;padding:0 20px 80px}
.form-topbar{display:flex;align-items:center;gap:12px;padding:16px 0 24px}
.form-back{width:36px;height:36px;border-radius:50%;background:var(--card);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--tx2);flex-shrink:0}
.form-step-bar{flex:1;height:4px;background:var(--lav-m);border-radius:999px;overflow:hidden}
.form-step-fill{height:100%;background:linear-gradient(90deg,var(--lav2),var(--lav3));border-radius:999px;transition:width .4s var(--ease)}
.form-step-label{font-size:11px;font-weight:700;color:var(--lav2);white-space:nowrap}

.form-section{background:var(--card);border-radius:24px;padding:24px;margin-bottom:14px}
.form-section-title{font-size:14px;font-weight:700;color:var(--tx2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:18px;display:flex;align-items:center;gap:8px}
.form-section-title span{font-size:18px}

.form-q{font-size:16px;font-weight:700;color:var(--tx);margin-bottom:10px;line-height:1.4}
.form-sub{font-size:13px;color:var(--tx2);margin-bottom:12px;line-height:1.6}

/* Stars */
.stars{display:flex;gap:8px;margin-bottom:8px}
.star-btn{font-size:28px;opacity:.3;transition:opacity .15s,transform .15s var(--spring);background:none;border:none;cursor:pointer}
.star-btn.on{opacity:1}
.star-btn:hover{transform:scale(1.15)}

/* Emoji pick */
.emoji-row{display:flex;gap:10px;flex-wrap:wrap}
.emoji-btn{font-size:28px;padding:8px;border-radius:14px;border:2px solid transparent;transition:border-color .15s,transform .15s var(--spring);background:none;cursor:pointer}
.emoji-btn.on{border-color:var(--lav2);background:var(--lav-s);transform:scale(1.12)}

/* Textarea */
.form-ta{width:100%;border:1.5px solid var(--bd);border-radius:14px;padding:14px;font-size:15px;color:var(--tx);background:var(--bg);outline:none;resize:none;line-height:1.65;transition:border-color .2s;margin-top:4px}
.form-ta:focus{border-color:var(--lav2)}

/* Workout toggle */
.toggle-row{display:flex;gap:10px;margin-top:4px}
.toggle-btn{flex:1;height:48px;border:1.5px solid var(--bd);border-radius:14px;font-size:15px;font-weight:700;color:var(--tx2);background:var(--card);transition:all .2s}
.toggle-btn.on{border-color:var(--lav2);background:var(--lav-s);color:var(--lav2)}

/* Next btn */
.form-next{width:100%;height:56px;background:linear-gradient(135deg,var(--lav2),var(--lav3));color:#fff;border-radius:999px;font-size:16px;font-weight:800;box-shadow:0 6px 24px rgba(155,123,255,.35);transition:transform .2s var(--spring);margin-top:8px}
.form-next:hover{transform:translateY(-2px) scale(1.01)}
.form-next:active{transform:scale(.97)}

/* COMPLETE */
.complete-card{width:100%;max-width:400px;text-align:center}
.complete-icon{font-size:64px;margin-bottom:16px}
.complete-title{font-size:26px;font-weight:900;color:var(--navy);letter-spacing:-.04em;margin-bottom:8px}
.complete-sub{font-size:15px;color:var(--tx2);line-height:1.75;margin-bottom:28px}
.complete-tip{background:var(--lav-s);border:1px solid var(--lav-m);border-radius:20px;padding:20px;text-align:left;margin-bottom:24px}
.complete-tip-title{font-size:12px;font-weight:700;color:var(--lav2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.complete-tip-text{font-size:14px;color:var(--navy);line-height:1.7}
.back-dash-btn{width:100%;height:52px;border:1.5px solid var(--lav-m);border-radius:999px;font-size:15px;font-weight:700;color:var(--navy);background:var(--card);transition:background .2s}
.back-dash-btn:hover{background:var(--lav-s)}

/* REDESIGN TIPS */
.redesign-tips=[
  "작은 성공도 성공입니다. 오늘 한 선택이 내일의 패턴이 됩니다.",
  "완벽하지 않아도 계속하면 됩니다. 방향이 맞으면 속도는 나중입니다.",
  "흔들린 순간을 기억하는 것 자체가 이미 변화의 시작입니다.",
  "지키는 날보다 빼먹는 날이 더 많아도 포기하지 않으면 됩니다.",
  "오늘 운동보다 '왜 하는지'를 기억하는 날이 더 중요합니다.",
  "습관은 의지가 아니라 구조로 만들어집니다. 환경을 설계하세요.",
  "21일은 끝이 아닙니다. 반복의 시작입니다."
];
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="screen">
  <div class="login-box">
    <div class="login-logo">FIT<em>-TI</em></div>
    <p class="login-sub">RESET21 · 행동 변화 21일 프로그램</p>
    <label class="login-label">확인 코드 입력</label>
    <input id="code-input" class="login-input" type="text" placeholder="코드를 입력하세요" autocapitalize="characters" autocomplete="off">
    <button class="login-btn" onclick="doLogin()">시작하기</button>
    <p class="login-err hidden" id="login-err">코드를 확인해주세요.</p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dash-screen" class="screen hidden" style="align-items:center;justify-content:flex-start;padding:0">
  <div id="dash">
    <div class="dash-header">
      <div class="dash-logo">FIT<em>-TI</em> RESET21</div>
      <button class="dash-logout" onclick="doLogout()">나가기</button>
    </div>

    <div class="day-card">
      <div class="day-card-inner">
        <div class="day-badge">YOUR JOURNEY</div>
        <div>
          <span class="day-num" id="day-num">1</span>
          <span class="day-total"> / 21일</span>
        </div>
        <div class="day-greeting" id="day-greeting"></div>
        <div class="day-progress-wrap">
          <div class="day-progress-bg">
            <div class="day-progress-fill" id="day-progress-fill" style="width:0%"></div>
          </div>
          <div class="day-progress-label" id="day-progress-label"></div>
        </div>
      </div>
    </div>

    <div class="status-card" id="today-status-card">
      <div class="status-icon" id="status-icon">📝</div>
      <div class="status-text">
        <div class="status-title" id="status-title">오늘의 체크인</div>
        <div class="status-sub" id="status-sub">운동 전·후 기록과 오늘의 리디자인</div>
      </div>
      <button class="status-btn" id="status-btn" onclick="goCheckin()">기록하기</button>
    </div>

    <div class="week-box">
      <div class="week-title">21일 진행 현황</div>
      <div class="week-grid" id="week-grid"></div>
    </div>
  </div>
</div>

<!-- CHECK-IN FORM -->
<div id="form-screen" class="hidden" style="min-height:100vh;display:flex;flex-direction:column;align-items:center">
  <div class="form-wrap">
    <div class="form-topbar">
      <button class="form-back" onclick="goBack()">←</button>
      <div class="form-step-bar"><div class="form-step-fill" id="step-fill" style="width:33%"></div></div>
      <div class="form-step-label" id="step-label">1 / 3</div>
    </div>
    <div id="form-content"></div>
  </div>
</div>

<!-- COMPLETE -->
<div id="complete-screen" class="screen hidden">
  <div class="complete-card">
    <div class="complete-icon">✅</div>
    <h2 class="complete-title">오늘도 기록했어요</h2>
    <p class="complete-sub" id="complete-msg">오늘 하루를 관찰했습니다.<br>이 기록이 쌓여 변화가 됩니다.</p>
    <div class="complete-tip">
      <div class="complete-tip-title">💜 오늘의 리디자인 TIP</div>
      <div class="complete-tip-text" id="complete-tip"></div>
    </div>
    <button class="back-dash-btn" onclick="goDash()">대시보드로 돌아가기</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://zjxadvumrhherdwekvwc.supabase.co';
const SUPABASE_KEY = 'sb_publishable_BppWS2XbAgPVjI3BOk2Wow_sggGgypS';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

const TIPS = [
  "작은 성공도 성공입니다. 오늘 한 선택이 내일의 패턴이 됩니다.",
  "완벽하지 않아도 계속하면 됩니다. 방향이 맞으면 속도는 나중입니다.",
  "흔들린 순간을 기억하는 것 자체가 이미 변화의 시작입니다.",
  "빼먹은 날보다 지키는 날이 더 많으면 됩니다. 평생의 기한을 두세요.",
  "오늘 운동보다 '왜 하는지'를 기억하는 날이 더 중요합니다.",
  "습관은 의지가 아니라 구조로 만들어집니다.",
  "21일은 끝이 아닙니다. 반복의 시작입니다.",
  "힘든 날도 기록하면 됩니다. 완벽한 날만 기록하는 게 아니에요.",
  "오늘 한 선택이 3주 후의 나를 만듭니다.",
  "비난하지 말고 관찰하세요. 패턴이 보이면 변화할 수 있습니다."
];

let member = null;
let checkins = [];
let formData = {};
let formStep = 1;

// ── UTILS ──
const $ = id => document.getElementById(id);
function showScreen(id){
  ['login-screen','dash-screen','form-screen','complete-screen'].forEach(s=>{
    const el=$(s);
    if(el) el.classList.toggle('hidden', s!==id);
  });
}
function today(){ return new Date().toISOString().split('T')[0]; }
function daysBetween(a,b){
  return Math.floor((new Date(b)-new Date(a))/(1000*60*60*24));
}

// ── LOGIN ──
async function doLogin(){
  const code = $('code-input').value.trim().toUpperCase();
  if(!code) return;
  const {data,error} = await db.from('members').select('*').eq('access_code',code).single();
  if(error||!data){ $('login-err').classList.remove('hidden'); return; }
  member = data;
  localStorage.setItem('r21_code', code);
  await loadDash();
}

async function autoLogin(){
  const code = localStorage.getItem('r21_code');
  if(!code) return;
  const {data} = await db.from('members').select('*').eq('access_code',code).single();
  if(data){ member=data; await loadDash(); }
}

function doLogout(){
  localStorage.removeItem('r21_code');
  member=null; checkins=[];
  showScreen('login-screen');
}

// ── DASHBOARD ──
async function loadDash(){
  const {data} = await db.from('checkins').select('*').eq('member_id',member.id).order('checkin_date');
  checkins = data||[];
  renderDash();
  showScreen('dash-screen');
}

function renderDash(){
  const startDate = member.start_date;
  const dayNum = Math.min(daysBetween(startDate, today())+1, 21);
  const pct = Math.round((dayNum/21)*100);

  $('day-num').textContent = dayNum;
  $('day-progress-fill').style.width = pct+'%';
  $('day-progress-label').textContent = `${checkins.length}일 기록 완료`;
  $('day-greeting').textContent = `${member.name}님, 오늘도 함께해요 💜`;

  // 오늘 체크인 여부
  const todayDone = checkins.some(c=>c.checkin_date===today());
  const card = $('today-status-card');
  const btn = $('status-btn');
  if(todayDone){
    card.classList.add('done');
    $('status-icon').textContent='✅';
    $('status-title').textContent='오늘 기록 완료';
    $('status-sub').textContent='오늘의 체크인을 마쳤어요';
    btn.textContent='수정'; btn.style.background='#aaa';
  } else {
    card.classList.remove('done');
    $('status-icon').textContent='📝';
    $('status-title').textContent='오늘의 체크인';
    $('status-sub').textContent='운동 전·후 기록과 오늘의 리디자인';
    btn.textContent='기록하기'; btn.style.background='';
  }

  // 21일 그리드
  const grid = $('week-grid');
  grid.innerHTML='';
  for(let i=1;i<=21;i++){
    const d = new Date(startDate);
    d.setDate(d.getDate()+i-1);
    const dateStr = d.toISOString().split('T')[0];
    const done = checkins.some(c=>c.checkin_date===dateStr);
    const isToday = dateStr===today();
    const future = d > new Date();
    const div = document.createElement('div');
    div.className = 'week-day'+(done?' done':isToday?' today':future?' future':'');
    div.textContent = i;
    grid.appendChild(div);
  }
}

// ── CHECK-IN FORM ──
function goCheckin(){ formStep=1; formData={}; renderForm(); showScreen('form-screen'); }
function goBack(){
  if(formStep>1){ formStep--; renderForm(); }
  else goDash();
}
function goDash(){ loadDash(); }

function renderForm(){
  const fills = ['33%','66%','100%'];
  const labels = ['1 / 3','2 / 3','3 / 3'];
  const titles = ['운동 전 체크','운동 기록','오늘의 리디자인'];
  $('step-fill').style.width = fills[formStep-1];
  $('step-label').textContent = labels[formStep-1];

  const c = $('form-content');
  if(formStep===1) c.innerHTML=`
    <div class="form-section">
      <div class="form-section-title"><span>🌅</span>${titles[0]}</div>
      <div class="form-q">오늘 컨디션은 어때요?</div>
      <div class="stars" id="stars">
        ${[1,2,3,4,5].map(i=>`<button class="star-btn ${(formData.pre_condition||0)>=i?'on':''}" onclick="setStar(${i})">⭐</button>`).join('')}
      </div>
      <div class="form-q" style="margin-top:18px">오늘 목표 한 가지</div>
      <div class="form-sub">작아도 괜찮아요. 구체적일수록 좋아요.</div>
      <textarea class="form-ta" id="pre-goal" rows="3" placeholder="예) 유튜브 영상 1편 따라하기">${formData.pre_goal||''}</textarea>
      <div class="form-q" style="margin-top:18px">오늘 운동할 건가요?</div>
      <div class="toggle-row">
        <button class="toggle-btn ${formData.workout_plan==='yes'?'on':''}" onclick="setToggle('yes')">✅ 할 거예요</button>
        <button class="toggle-btn ${formData.workout_plan==='rest'?'on':''}" onclick="setToggle('rest')">💤 오늘은 쉬는 날</button>
      </div>
    </div>
    <button class="form-next" onclick="nextStep1()">다음 →</button>`;

  else if(formStep===2) c.innerHTML=`
    <div class="form-section">
      <div class="form-section-title"><span>🏃</span>${titles[1]}</div>
      <div class="form-q">운동을 했나요?</div>
      <div class="toggle-row">
        <button class="toggle-btn ${formData.workout_done===true?'on':''}" onclick="setWorkout(true)">✅ 했어요</button>
        <button class="toggle-btn ${formData.workout_done===false?'on':''}" onclick="setWorkout(false)">😅 못 했어요</button>
      </div>
      <div id="workout-detail" style="${formData.workout_done===false?'opacity:.4':''}">
        <div class="form-q" style="margin-top:18px">어떤 운동을 했나요?</div>
        <textarea class="form-ta" id="workout-type" rows="2" placeholder="예) 유튜브 영상 3번, 스쿼트 20개 3세트">${formData.workout_type||''}</textarea>
        <div class="form-q" style="margin-top:18px">운동 후 기분은?</div>
        <div class="emoji-row" id="emoji-row">
          ${['😊','💪','😌','😅','😴','🥺','⚡'].map(e=>`<button class="emoji-btn ${formData.post_feeling===e?'on':''}" onclick="setEmoji('${e}')">${e}</button>`).join('')}
        </div>
        <div class="form-q" style="margin-top:18px">한 줄 소감</div>
        <textarea class="form-ta" id="post-note" rows="2" placeholder="예) 생각보다 덜 힘들었어요">${formData.post_note||''}</textarea>
      </div>
    </div>
    <button class="form-next" onclick="nextStep2()">다음 →</button>`;

  else if(formStep===3) c.innerHTML=`
    <div class="form-section">
      <div class="form-section-title"><span>💜</span>${titles[2]}</div>
      <p style="font-size:13px;color:var(--tx2);line-height:1.7;margin-bottom:18px">오늘 나를 관찰해봐요.<br>정답이 없어요. 솔직하게 써보세요.</p>
      <div class="form-q">오늘 가장 흔들렸던 순간은?</div>
      <div class="form-sub">�귀찮았던 순간, 포기하고 싶었던 순간, 먹고 싶었던 순간</div>
      <textarea class="form-ta" id="r-moment" rows="3" placeholder="예) 퇴근하고 소파에 누웠을 때">${formData.redesign_moment||''}</textarea>
      <div class="form-q" style="margin-top:18px">그 순간 어떤 선택을 했나요?</div>
      <textarea class="form-ta" id="r-choice" rows="3" placeholder="예) 그냥 누워있다가 결국 운동 안 했어요">${formData.redesign_choice||''}</textarea>
      <div class="form-q" style="margin-top:18px">내일 하나만 바꾼다면?</div>
      <div class="form-sub">아주 작아도 괜찮아요.</div>
      <textarea class="form-ta" id="r-tomorrow" rows="3" placeholder="예) 퇴근하자마자 바로 운동복 입기">${formData.redesign_tomorrow||''}</textarea>
    </div>
    <button class="form-next" onclick="submitCheckin()">기록 완료 ✓</button>`;
}

function setStar(n){
  formData.pre_condition=n;
  document.querySelectorAll('.star-btn').forEach((b,i)=>b.classList.toggle('on',i<n));
}
function setToggle(v){
  formData.workout_plan=v;
  document.querySelectorAll('.toggle-btn').forEach(b=>b.classList.remove('on'));
  event.target.classList.add('on');
}
function setWorkout(v){
  formData.workout_done=v;
  document.querySelectorAll('.toggle-btn').forEach(b=>b.classList.remove('on'));
  event.target.classList.add('on');
  const detail = document.getElementById('workout-detail');
  if(detail) detail.style.opacity = v?'1':'.4';
}
function setEmoji(e){
  formData.post_feeling=e;
  document.querySelectorAll('.emoji-btn').forEach(b=>b.classList.toggle('on',b.textContent===e));
}

function nextStep1(){
  formData.pre_goal = $('pre-goal')?.value||'';
  if(!formData.pre_condition){ alert('컨디션을 선택해주세요 ⭐'); return; }
  formStep=2; renderForm();
}
function nextStep2(){
  formData.workout_type = $('workout-type')?.value||'';
  formData.post_note = $('post-note')?.value||'';
  formStep=3; renderForm();
}

async function submitCheckin(){
  formData.redesign_moment = $('r-moment')?.value||'';
  formData.redesign_choice = $('r-choice')?.value||'';
  formData.redesign_tomorrow = $('r-tomorrow')?.value||'';

  const dayNum = Math.min(daysBetween(member.start_date, today())+1, 21);
  const payload = {
    member_id: member.id,
    checkin_date: today(),
    day_number: dayNum,
    pre_condition: formData.pre_condition||null,
    pre_goal: formData.pre_goal||null,
    workout_done: formData.workout_done||false,
    workout_type: formData.workout_type||null,
    post_feeling: formData.post_feeling||null,
    post_note: formData.post_note||null,
    redesign_moment: formData.redesign_moment||null,
    redesign_choice: formData.redesign_choice||null,
    redesign_tomorrow: formData.redesign_tomorrow||null
  };

  const {error} = await db.from('checkins').upsert(payload, {onConflict:'member_id,checkin_date'});
  if(error){ alert('저장 중 오류가 발생했어요. 다시 시도해주세요.'); console.error(error); return; }

  $('complete-tip').textContent = TIPS[dayNum % TIPS.length];
  showScreen('complete-screen');
}

// 자동 로그인
autoLogin();
</script>
</body>
</html>
